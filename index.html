<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Generator</title>
</head>
<body>

    <h1>Marathi Post Generator</h1>

    <form method="POST">
        <label>Product Name</label><br>
        <input type="text" name="product_name" placeholder="e.g. Samsung TV"><br><br>

        <label>Price</label><br>
        <input type="text" name="price" placeholder="e.g. 28000"><br><br>

        <label>Extra Detail</label><br>
        <input type="text" name="extra" placeholder="e.g. 2 year warranty, new stock"><br><br>

        <button type="submit">Generate Posts</button>
    </form>

    {% if data %}
        <hr>
        <h2>Facebook Post</h2>
        <p>{{ data["facebook_post"] }}</p>

        <h2>Instagram Caption</h2>
        <p>{{ data["instagram_caption"] }}</p>

        <h2>WhatsApp Message</h2>
        <p>{{ data["whatsapp_message"] }}</p>
    {% endif %}

</body>
</html>
